<!-- custom-comments.html -->

<!-- 引入评论系统的样式 -->
<link rel="stylesheet" href="{{ "css/comments.css" | relURL }}">

<!-- 评论区的HTML结构 -->
<div id="comment-section"></div>

<!-- 分页控制 -->
<div id="pagination-container" class="pagination">
    <!-- 分页按钮和页码 -->
    <div id="pagination-controls" class="pagination-controls">
      <!-- 上一页按钮 -->
      <button onclick="prevPage()" class="pagination-button" id="prev-btn">上一页</button>
  
      <!-- 页码按钮，动态生成 -->
      <div id="page-numbers" class="page-numbers"></div>
  
      <!-- 下一页按钮 -->
      <button onclick="nextPage()" class="pagination-button" id="next-btn">下一页</button>
    </div>
  </div>

<!-- 评论输入框 -->
<div id="comment-input-area" class="comment-form">
    <!-- 第一行：评论内容输入框 -->
    <div class="textarea-container">
      <textarea id="comment-input" placeholder="请输入评论"></textarea>
    </div>
  
    <!-- 第二行：昵称输入框、图片选择框、提交按钮 -->
    <div class="info-container">
      <input type="text" id="username-input" class="nickname-input" placeholder="输入昵称（默认匿名）">
      <input type="file" id="image-input" class="image-upload" accept="image/*">
      <button onclick="postComment()" class="submit-button">提交评论</button>
    </div>
</div>

<!-- 引入评论系统的脚本 -->
<script src="{{ "js/comments.js" | relURL }}"></script>
